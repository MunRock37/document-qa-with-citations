services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./data:/app/data
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    ports:
      - "5173:5173"
